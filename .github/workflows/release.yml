name: release

# Publish to PyPI via OIDC trusted publishing (no token stored anywhere).
# One-time setup on PyPI: add a trusted publisher for project "mneme-memory",
# owner "HarperZ9", repo "mneme", workflow "release.yml". Then:
#   git tag v0.1.0 && git push origin v0.1.0
# publishes automatically. GitHub Releases can also trigger it.

on:
  push:
    tags: ["v*"]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: verify the tag matches pyproject version
        run: |
          python -m pip install build
          python -m build
          PKG_VER=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG_VER="${GITHUB_REF_NAME#v}"
          if [ -n "$TAG_VER" ] && [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "tag $TAG_VER != pyproject $PKG_VER"; exit 1
          fi
      - name: install the wheel and smoke the CLI (no broken release)
        run: |
          python -m venv /tmp/v && /tmp/v/bin/pip install dist/*.whl
          /tmp/v/bin/mneme --version && /tmp/v/bin/mneme bench > /dev/null
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    # gated: stays skipped until PyPI trusted publishing is set up and the repo
    # variable PYPI_ENABLED is set to 'true' — so a tag/release builds + smokes
    # without a failing publish run before the trusted publisher exists.
    if: ${{ vars.PYPI_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # OIDC: no token, no secret
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
